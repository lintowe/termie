name: release

# build, test, and attach the Windows installer when a version tag is pushed.
# the installer is built with Inno Setup (installer.iss) and named
# termie-<version>-windows-x64-setup.exe
on:
  push:
    tags: ['v*']

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  release:
    if: github.actor == 'lintowe'
    runs-on: [self-hosted, windows-vm]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: test
        run: cargo test

      - name: build (release, LTO)
        run: cargo build --release

      - name: build installer (Inno Setup)
        shell: powershell
        run: |
          $ver = "${{ github.ref_name }}" -replace '^v',''
          $iscc = "$env:LOCALAPPDATA\Programs\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) {
            Write-Host "installing Inno Setup (per-user, no admin)..."
            $is = Join-Path $env:RUNNER_TEMP "innosetup.exe"
            Invoke-WebRequest 'https://jrsoftware.org/download.php/is.exe' -OutFile $is -UseBasicParsing -MaximumRedirection 5
            Start-Process $is -ArgumentList '/VERYSILENT','/CURRENTUSER','/SUPPRESSMSGBOXES','/NORESTART' -Wait
          }
          & $iscc /DMyAppVersion=$ver installer.iss
          if ($LASTEXITCODE -ne 0) { throw "ISCC failed with exit code $LASTEXITCODE" }

      - name: attach to the release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          files: dist/termie-*-windows-x64-setup.exe
          fail_on_unmatched_files: true
